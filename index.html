<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>الحاسبة المطورة للعام الدراسي 1448هـ - Elite Story</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-1: #edf7f4;
            --bg-2: #fbf7ef;
            --bg-3: #f4efe5;
            --card-bg: rgba(255, 255, 255, 0.94);
            --primary: #0b6b5b;
            --primary-dark: #06483e;
            --accent: #c8a96b;
            --accent-soft: #f8efde;
            --text: #18312c;
            --muted: #64756f;
            --border: rgba(11, 107, 91, 0.12);
            --shadow: 0 22px 55px rgba(4, 56, 48, 0.12);
            --shadow-soft: 0 14px 35px rgba(4, 56, 48, 0.08);
            --radius-xl: 28px;

            --success: #1f7a47;
            --info: #0f6c78;
            --kg: #9c295e;
            --middle: #1c63b7;
            --secondary: #8e6a09;
            --neutral: #546e7a;
            --danger: #455a64;

            --whatsapp-1: #2dd36f;
            --whatsapp-2: #159a4d;
            --telegram-1: #33a9e8;
            --telegram-2: #1d7fb7;
            --copy-1: #7b8794;
            --copy-2: #5b6570;
            --image-1: #f59e0b;
            --image-2: #d97706;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            min-height: 100%;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Cairo", "Segoe UI", Tahoma, sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top right, rgba(200, 169, 107, 0.24), transparent 24%),
                radial-gradient(circle at bottom left, rgba(11, 107, 91, 0.18), transparent 30%),
                linear-gradient(135deg, var(--bg-1), var(--bg-2), var(--bg-3));
            overflow-x: hidden;
        }

        .page {
            min-height: 100vh;
            width: 100%;
            display: flex;
            align-items: stretch;
            justify-content: center;
            padding: 14px;
        }

        .app-shell {
            width: 100%;
            max-width: 580px;
            min-height: calc(100vh - 28px);
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .hero {
            position: relative;
            overflow: hidden;
            border-radius: 24px;
            padding: 14px 18px;
            background: linear-gradient(135deg, var(--primary-dark), var(--primary));
            color: #fff;
            box-shadow: var(--shadow);
            animation: fadeUp 0.8s ease both;
            isolation: isolate;
        }

        .hero::before,
        .hero::after {
            content: "";
            position: absolute;
            border-radius: 50%;
            background: rgba(255,255,255,0.08);
            pointer-events: none;
            z-index: -1;
        }

        .hero::before {
            width: 190px;
            height: 190px;
            top: -65px;
            left: -38px;
        }

        .hero::after {
            width: 135px;
            height: 135px;
            bottom: -36px;
            right: -24px;
        }

        .hero h1 {
            margin: 0;
            font-size: 1.14rem;
            line-height: 1.9;
            font-weight: 900;
            text-align: center;
            letter-spacing: .1px;
        }

        .card {
            position: relative;
            background: var(--card-bg);
            backdrop-filter: blur(14px);
            border: 1px solid rgba(255,255,255,0.58);
            border-radius: var(--radius-xl);
            padding: 18px;
            box-shadow: var(--shadow);
            animation: fadeUp 0.85s ease both;
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .icon-wrap {
            width: 50px;
            height: 50px;
            border-radius: 18px;
            display: grid;
            place-items: center;
            background: linear-gradient(135deg, rgba(11, 107, 91, 0.12), rgba(200, 169, 107, 0.24));
            color: var(--primary);
            flex-shrink: 0;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.65);
        }

        .card-header h2 {
            margin: 0;
            font-size: 1.05rem;
            font-weight: 900;
            color: var(--primary-dark);
        }

        .input-row {
            display: grid;
            grid-template-columns: 1fr 1.5fr 1fr;
            gap: 10px;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        label {
            font-size: 0.79rem;
            font-weight: 800;
            color: var(--primary-dark);
            padding-right: 4px;
        }

        select {
            width: 100%;
            min-height: 50px;
            border: 1px solid var(--border);
            border-radius: 15px;
            background: #fff;
            color: var(--text);
            font-family: inherit;
            font-size: 0.96rem;
            font-weight: 700;
            padding: 0 10px;
            outline: none;
            transition: transform .2s ease, border-color .2s ease, box-shadow .2s ease;
            box-shadow: 0 5px 15px rgba(8, 46, 40, 0.04);
        }

        select:focus {
            border-color: rgba(11, 107, 91, 0.45);
            box-shadow: 0 0 0 4px rgba(11, 107, 91, 0.10);
            transform: translateY(-1px);
        }

        .actions {
            margin-top: 14px;
        }

        button {
            border: none;
            width: 100%;
            min-height: 54px;
            border-radius: 16px;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 900;
            cursor: pointer;
            transition: transform .18s ease, box-shadow .18s ease, filter .18s ease, opacity .18s ease;
        }

        button:hover { transform: translateY(-2px); }
        button:active { transform: translateY(0); }

        .btn-main {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: #fff;
            box-shadow: 0 14px 28px rgba(11, 107, 91, 0.24);
        }

        .btn-calc {
            background: linear-gradient(135deg, #d8bb83, #b78f45);
            color: #17342d;
            box-shadow: 0 14px 28px rgba(182, 145, 73, 0.25);
        }

        .result-box {
            margin-top: 14px;
            display: none;
            border-radius: 20px;
            padding: 14px 16px;
            background: linear-gradient(135deg, #fffaf1, var(--accent-soft));
            border: 1px solid rgba(200, 169, 107, 0.34);
            color: var(--primary-dark);
            font-weight: 800;
            line-height: 1.9;
            animation: zoomFade .35s ease;
            box-shadow: var(--shadow-soft);
        }

        .result-box strong {
            color: var(--primary);
            font-size: 1.05rem;
        }

        .result-area {
            display: none;
            margin-top: 16px;
            animation: zoomFade .35s ease;
        }

        .capture-card {
            border-radius: 24px;
            overflow: hidden;
        }

        .stage {
            display: none;
            position: relative;
            overflow: hidden;
            border-radius: 24px;
            padding: 18px 16px 14px;
            color: #fff;
            text-align: center;
            box-shadow: 0 16px 30px rgba(0,0,0,0.14);
        }

        .stage::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle at top left, rgba(255,255,255,0.18), transparent 30%),
                linear-gradient(to bottom, rgba(255,255,255,0.06), transparent);
            pointer-events: none;
        }

        .stage-top-icons {
            position: relative;
            z-index: 1;
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 10px;
        }

        .mini-icon {
            width: 34px;
            height: 34px;
            border-radius: 999px;
            display: grid;
            place-items: center;
            background: rgba(255,255,255,0.14);
            border: 1px solid rgba(255,255,255,0.18);
            backdrop-filter: blur(8px);
        }

        .stage-title {
            font-size: 1.12rem;
            font-weight: 900;
            line-height: 1.9;
            margin-bottom: 2px;
            position: relative;
            z-index: 1;
        }

        .capture-meta {
            margin-top: 12px;
            padding: 10px 12px;
            border-radius: 16px;
            background: rgba(255,255,255,0.14);
            border: 1px solid rgba(255,255,255,0.18);
            font-size: 0.84rem;
            font-weight: 800;
            line-height: 1.9;
            position: relative;
            z-index: 1;
        }

        .age-cards {
            margin-top: 16px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            direction: ltr;
            position: relative;
            z-index: 1;
        }

        .age-card {
            background: rgba(255,255,255,0.14);
            border: 1px solid rgba(255,255,255,0.18);
            border-radius: 18px;
            padding: 13px 8px;
            backdrop-filter: blur(8px);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.16);
        }

        .age-number {
            display: block;
            font-size: 1.45rem;
            font-weight: 900;
            line-height: 1.2;
            margin-bottom: 4px;
        }

        .age-label {
            display: block;
            font-size: 0.82rem;
            font-weight: 800;
            opacity: 0.96;
        }

        .share-panel {
            margin-top: 14px;
            padding: 14px;
            border-radius: 22px;
            background: linear-gradient(135deg, rgba(255,255,255,0.90), rgba(249,245,235,0.95));
            border: 1px solid rgba(11, 107, 91, 0.08);
            box-shadow: var(--shadow-soft);
            display: none;
        }

        .share-title {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 0.92rem;
            font-weight: 900;
            color: var(--primary-dark);
            margin-bottom: 12px;
        }

        .share-actions {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .share-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            min-height: 48px;
            border-radius: 16px;
            font-size: 0.92rem;
            font-weight: 900;
            color: #fff;
            box-shadow: 0 10px 20px rgba(0,0,0,0.10);
        }

        .share-whatsapp {
            background: linear-gradient(135deg, var(--whatsapp-1), var(--whatsapp-2));
        }

        .share-telegram {
            background: linear-gradient(135deg, var(--telegram-1), var(--telegram-2));
        }

        .share-copy {
            background: linear-gradient(135deg, var(--copy-1), var(--copy-2));
        }

        .share-image {
            background: linear-gradient(135deg, var(--image-1), var(--image-2));
        }

        .copy-status {
            display: none;
            margin-top: 10px;
            padding: 11px 12px;
            border-radius: 14px;
            background: linear-gradient(135deg, rgba(11, 107, 91, 0.08), rgba(200, 169, 107, 0.10));
            border: 1px solid rgba(11, 107, 91, 0.08);
            color: var(--primary-dark);
            font-size: 0.88rem;
            font-weight: 800;
            text-align: center;
        }

        .footer {
            text-align: center;
            padding: 8px 8px 2px;
            color: var(--primary-dark);
            animation: fadeUp 1s ease both;
        }

        .footer .name {
            font-weight: 900;
            font-size: 0.96rem;
        }

        .footer .version {
            color: var(--muted);
            font-size: 0.82rem;
            margin-top: 4px;
            font-weight: 700;
        }

        .share-capture-wrapper {
            position: fixed;
            inset: 0;
            z-index: -9999;
            opacity: 0;
            pointer-events: none;
        }

        .share-capture-frame {
            width: 1080px;
            height: 1920px;
            padding: 90px 70px;
            background:
                radial-gradient(circle at top right, rgba(200, 169, 107, 0.30), transparent 22%),
                radial-gradient(circle at bottom left, rgba(11, 107, 91, 0.24), transparent 28%),
                linear-gradient(160deg, #edf7f4 0%, #fbf7ef 48%, #f4efe5 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .share-capture-card {
            width: 100%;
            max-width: 760px;
            border-radius: 42px;
            padding: 28px;
            background: rgba(255,255,255,0.34);
            border: 1px solid rgba(255,255,255,0.55);
            box-shadow: 0 35px 80px rgba(4, 56, 48, 0.16);
            backdrop-filter: blur(12px);
        }

        .story-header {
            text-align: center;
            margin-bottom: 20px;
            color: var(--primary-dark);
        }

        .story-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 8px 16px;
            border-radius: 999px;
            background: rgba(255,255,255,0.72);
            color: var(--primary-dark);
            border: 1px solid rgba(11, 107, 91, 0.08);
            box-shadow: 0 10px 24px rgba(4, 56, 48, 0.08);
            font-size: 1rem;
            font-weight: 900;
            margin-bottom: 12px;
        }

        .story-title {
            margin: 0;
            font-size: 2rem;
            font-weight: 900;
            line-height: 1.7;
            color: var(--primary-dark);
        }

        .story-subtitle {
            margin-top: 8px;
            font-size: 1rem;
            font-weight: 700;
            color: var(--muted);
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(18px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes zoomFade {
            from {
                opacity: 0;
                transform: scale(0.97);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @media (max-width: 420px) {
            .page {
                padding: 10px;
            }

            .app-shell {
                min-height: calc(100vh - 20px);
                gap: 12px;
            }

            .hero {
                padding: 11px 14px;
                border-radius: 20px;
            }

            .hero h1 {
                font-size: 1.02rem;
            }

            .card {
                padding: 16px;
                border-radius: 24px;
            }

            .input-row {
                gap: 8px;
            }

            select {
                min-height: 47px;
                font-size: 0.9rem;
                padding: 0 8px;
            }

            button {
                min-height: 50px;
                font-size: 0.95rem;
            }

            .stage-title {
                font-size: 1.02rem;
            }

            .age-cards {
                gap: 8px;
            }

            .age-card {
                padding: 11px 6px;
                border-radius: 16px;
            }

            .age-number {
                font-size: 1.18rem;
            }

            .age-label {
                font-size: 0.75rem;
            }

            .share-actions {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <script>
        const hijriMonths = [
            "1 - محرم", "2 - صفر", "3 - ربيع الأول", "4 - ربيع الآخر",
            "5 - جمادى الأولى", "6 - جمادى الآخرة", "7 - رجب", "8 - شعبان",
            "9 - رمضان", "10 - شوال", "11 - ذو القعدة", "12 - ذو الحجة"
        ];

        const gregorianMonths = [
            "1 - يناير", "2 - فبراير", "3 - مارس", "4 - أبريل",
            "5 - مايو", "6 - يونيو", "7 - يوليو", "8 - أغسطس",
            "9 - سبتمبر", "10 - أكتوبر", "11 - نوفمبر", "12 - ديسمبر"
        ];

        let lastResultText = "";
        let lastBirthDateText = "";
        let lastAgeText = "";
        let lastStageText = "";
        let lastResolvedColor = "";

        window.onload = function () {
            const hDay = document.getElementById("hDay");
            const hMonth = document.getElementById("hMonth");
            const hYear = document.getElementById("hYear");

            const gDay = document.getElementById("gDay");
            const gMonth = document.getElementById("gMonth");
            const gYear = document.getElementById("gYear");

            for (let i = 1; i <= 30; i++) {
                hDay.innerHTML += `<option value="${i}">${i}</option>`;
            }

            hijriMonths.forEach((month, index) => {
                hMonth.innerHTML += `<option value="${index + 1}">${month}</option>`;
            });

            for (let i = 1450; i >= 1390; i--) {
                hYear.innerHTML += `<option value="${i}">${i}</option>`;
            }

            for (let i = 1; i <= 31; i++) {
                gDay.innerHTML += `<option value="${i}">${i}</option>`;
            }

            gregorianMonths.forEach((month, index) => {
                gMonth.innerHTML += `<option value="${index + 1}">${month}</option>`;
            });

            for (let i = 2026; i >= 1995; i--) {
                gYear.innerHTML += `<option value="${i}">${i}</option>`;
            }
        };

        function setGregorianDate(day, month, year) {
            document.getElementById("gDay").value = String(Number(day));
            document.getElementById("gMonth").value = String(Number(month));
            document.getElementById("gYear").value = String(year);
        }

        function showHijriResult(message) {
            const hResult = document.getElementById("hResult");
            hResult.style.display = "block";
            hResult.innerHTML = message;
        }

        function showCopyStatus(message) {
            const copyStatus = document.getElementById("copyStatus");
            copyStatus.style.display = "block";
            copyStatus.textContent = message;
        }

        function convertHijri() {
            const hDay = document.getElementById("hDay").value;
            const hMonth = document.getElementById("hMonth").value;
            const hYear = document.getElementById("hYear").value;

            const date = moment(`${hYear}/${hMonth}/${hDay}`, "iYYYY/iM/iD");

            if (!date.isValid()) {
                showHijriResult("تعذر تحويل التاريخ الهجري، يرجى التأكد من صحة الإدخال.");
                return;
            }

            const gYear = date.format("YYYY");
            const gMonth = date.format("M");
            const gDay = date.format("D");

            showHijriResult(`تم التحويل بنجاح — التاريخ الميلادي: <strong>${gYear}/${String(gMonth).padStart(2, "0")}/${String(gDay).padStart(2, "0")}</strong>`);

            setGregorianDate(gDay, gMonth, gYear);
            calculate();
        }

        function calculate() {
            const d = parseInt(document.getElementById("gDay").value, 10);
            const m = parseInt(document.getElementById("gMonth").value, 10);
            const y = parseInt(document.getElementById("gYear").value, 10);

            const birth = new Date(y, m - 1, d);
            const target = new Date(2026, 7, 24);

            if (isNaN(birth.getTime())) return;

            let years = target.getFullYear() - birth.getFullYear();
            let months = target.getMonth() - birth.getMonth();
            let days = target.getDate() - birth.getDate();

            if (days < 0) {
                months--;
                days += new Date(target.getFullYear(), target.getMonth(), 0).getDate();
            }

            if (months < 0) {
                years--;
                months += 12;
            }

            const resultArea = document.getElementById("resultArea");
            const stageOut = document.getElementById("stageOutput");
            const sharePanel = document.getElementById("sharePanel");
            const copyStatus = document.getElementById("copyStatus");

            resultArea.style.display = "block";
            stageOut.style.display = "block";
            sharePanel.style.display = "block";
            copyStatus.style.display = "none";
            copyStatus.textContent = "";

            let text = "";
            let color = "";

            const primaryLimit = new Date(2020, 7, 24);
            const graceLimitEnd = new Date(2020, 10, 22);
            const kg3End = new Date(2021, 7, 24);
            const kg2Start = new Date(2021, 7, 25);
            const kg2End = new Date(2022, 7, 24);
            const kg1Start = new Date(2022, 7, 25);
            const kg1End = new Date(2023, 7, 24);

            if (birth <= primaryLimit && years < 7) {
                text = "الصف الأول الابتدائي (الفئة الأولى)";
                color = "var(--success)";
            } else if (birth > primaryLimit && birth <= graceLimitEnd) {
                text = "الصف الأول الابتدائي (بشرط الروضة) أو رياض الأطفال (KG3)";
                color = "var(--info)";
            } else if (birth > graceLimitEnd && birth <= kg3End) {
                text = "رياض الأطفال - المستوى الثالث (KG3)";
                color = "var(--kg)";
            } else if (birth >= kg2Start && birth <= kg2End) {
                text = "رياض الأطفال - المستوى الثاني (KG2)";
                color = "var(--kg)";
            } else if (birth >= kg1Start && birth <= kg1End) {
                text = "رياض الأطفال - المستوى الأول (KG1)";
                color = "var(--kg)";
            } else if (years === 7) {
                text = "الصف الثاني الابتدائي";
                color = "var(--success)";
            } else if (years === 8) {
                text = "الصف الثالث الابتدائي";
                color = "var(--success)";
            } else if (years === 9) {
                text = "الصف الرابع الابتدائي";
                color = "var(--success)";
            } else if (years === 10) {
                text = "الصف الخامس الابتدائي";
                color = "var(--success)";
            } else if (years === 11) {
                text = "الصف السادس الابتدائي";
                color = "var(--success)";
            } else if (years === 12) {
                text = "الصف الأول المتوسط";
                color = "var(--middle)";
            } else if (years === 13) {
                text = "الصف الثاني المتوسط";
                color = "var(--middle)";
            } else if (years === 14) {
                text = "الصف الثالث المتوسط";
                color = "var(--middle)";
            } else if (years === 15) {
                text = "الصف الأول الثانوي";
                color = "var(--secondary)";
            } else if (years === 16) {
                text = "الصف الثاني الثانوي";
                color = "var(--secondary)";
            } else if (years >= 17 && years <= 21) {
                text = "الصف الثالث الثانوي";
                color = "var(--secondary)";
            } else if (years < 3) {
                text = "دون سن القبول";
                color = "var(--neutral)";
            } else {
                text = "خارج نطاق السلم التعليمي";
                color = "var(--danger)";
            }

            lastBirthDateText = `${String(d).padStart(2, "0")}/${String(m).padStart(2, "0")}/${y}`;
            lastAgeText = `${years} سنة - ${months} شهر - ${days} يوم`;
            lastStageText = text;
            lastResolvedColor = resolveColor(color);

            stageOut.innerHTML = createStageMarkup(text, lastBirthDateText, lastAgeText, years, months, days);
            stageOut.style.background = `linear-gradient(135deg, ${lastResolvedColor}, ${darkenColor(lastResolvedColor)})`;

            lastResultText =
`نتيجة حاسبة الصف المستحق
تاريخ الميلاد: ${lastBirthDateText}
العمر:
${lastAgeText}
النتيجة: ${text}`;
        }

        function createStageMarkup(text, birthDate, ageText, years, months, days) {
            return `
                <div class="stage-top-icons">
                    <div class="mini-icon">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                            <path d="M8 2V5M16 2V5M3 9H21M5 4H19C20.1046 4 21 4.89543 21 6V19C21 20.1046 20.1046 21 19 21H5C3.89543 21 3 20.1046 3 19V6C3 4.89543 3.89543 4 5 4Z" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </div>
                    <div class="mini-icon">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                            <path d="M12 14C15.3137 14 18 11.3137 18 8C18 4.68629 15.3137 2 12 2C8.68629 2 6 4.68629 6 8C6 11.3137 8.68629 14 12 14Z" stroke="currentColor" stroke-width="1.6"/>
                            <path d="M4 21C4.85038 18.1085 7.17792 16 12 16C16.8221 16 19.1496 18.1085 20 21" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
                        </svg>
                    </div>
                    <div class="mini-icon">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                            <path d="M12 8V12L15 15" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
                            <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.6"/>
                        </svg>
                    </div>
                </div>

                <div class="stage-title">${text}</div>

                <div class="capture-meta">
                    <div><strong>تاريخ الميلاد:</strong> ${birthDate}</div>
                    <div><strong>العمر:</strong> ${ageText}</div>
                </div>

                <div class="age-cards">
                    <div class="age-card">
                        <span class="age-number">${years}</span>
                        <span class="age-label">سنوات</span>
                    </div>
                    <div class="age-card">
                        <span class="age-number">${months}</span>
                        <span class="age-label">شهور</span>
                    </div>
                    <div class="age-card">
                        <span class="age-number">${days}</span>
                        <span class="age-label">أيام</span>
                    </div>
                </div>
            `;
        }

        function resolveColor(variableName) {
            const temp = document.createElement("div");
            temp.style.color = variableName;
            document.body.appendChild(temp);
            const resolved = getComputedStyle(temp).color;
            document.body.removeChild(temp);
            return resolved;
        }

        function darkenColor(rgb) {
            const values = rgb.match(/\d+/g);
            if (!values) return rgb;
            const [r, g, b] = values.map(Number);
            const darken = (v) => Math.max(0, Math.round(v * 0.78));
            return `rgb(${darken(r)}, ${darken(g)}, ${darken(b)})`;
        }

        function getShareText() {
            return lastResultText || "لم يتم حساب النتيجة بعد.";
        }

        async function copyResult() {
            const text = getShareText();

            try {
                await navigator.clipboard.writeText(text);
                showCopyStatus("تم نسخ النتيجة النصية بنجاح.");
            } catch (error) {
                showCopyStatus("تعذر نسخ النتيجة تلقائيًا.");
            }
        }

        function createShareCaptureElement() {
            if (!lastResultText) throw new Error("no-result");

            const wrapper = document.getElementById("shareCaptureWrapper");
            const card = document.getElementById("shareCaptureCard");

            const ageParts = lastAgeText.split(" - ");
            const years = ageParts[0]?.match(/\d+/)?.[0] || "0";
            const months = ageParts[1]?.match(/\d+/)?.[0] || "0";
            const days = ageParts[2]?.match(/\d+/)?.[0] || "0";

            card.innerHTML = `
                <div class="story-header">
                    <div class="story-badge">حساب الصف المستحق</div>
                    <h2 class="story-title">نتيجة الطالب</h2>
                    <div class="story-subtitle">للعام الدراسي 1448 هـ</div>
                </div>

                <div class="stage" style="
                    display:block;
                    background: linear-gradient(135deg, ${lastResolvedColor}, ${darkenColor(lastResolvedColor)});
                    border-radius: 34px;
                    padding: 28px 24px 24px;
                    box-shadow: 0 26px 50px rgba(0,0,0,0.16);
                ">
                    ${createStageMarkup(lastStageText, lastBirthDateText, lastAgeText, years, months, days)}
                </div>
            `;

            wrapper.style.opacity = "1";
            wrapper.style.zIndex = "9999";

            return { wrapper, card };
        }

        function cleanupShareCapture() {
            const wrapper = document.getElementById("shareCaptureWrapper");
            const card = document.getElementById("shareCaptureCard");
            wrapper.style.opacity = "0";
            wrapper.style.zIndex = "-9999";
            card.innerHTML = "";
        }

        async function generateResultBlob() {
            const sharePanel = document.getElementById("sharePanel");

            if (!lastResultText) {
                throw new Error("no-result");
            }

            const originalDisplay = sharePanel.style.display;
            sharePanel.style.display = "none";

            try {
                const { card } = createShareCaptureElement();
                await new Promise(resolve => setTimeout(resolve, 120));

                const canvas = await html2canvas(card, {
                    backgroundColor: null,
                    scale: 2.5,
                    useCORS: true
                });

                const blob = await new Promise((resolve) => canvas.toBlob(resolve, "image/png"));
                if (!blob) throw new Error("blob-failed");

                return blob;
            } finally {
                cleanupShareCapture();
                sharePanel.style.display = originalDisplay || "block";
            }
        }

        async function saveBlobAsImage(blob) {
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.href = url;
            link.download = "نتيجة-حاسبة-الصف-المستحق-story.png";
            link.click();
            setTimeout(() => URL.revokeObjectURL(url), 1500);
        }

        async function shareImageToApp(appName) {
            try {
                showCopyStatus("جارٍ تجهيز صورة Story...");
                const blob = await generateResultBlob();
                const file = new File([blob], "نتيجة-حاسبة-الصف-المستحق-story.png", { type: "image/png" });

                if (navigator.canShare && navigator.canShare({ files: [file] }) && navigator.share) {
                    await navigator.share({
                        title: "نتيجة حاسبة الصف المستحق",
                        text: appName === "whatsapp" ? "مشاركة الصورة عبر واتساب" : "مشاركة الصورة عبر تليجرام",
                        files: [file]
                    });
                    showCopyStatus("تم فتح نافذة مشاركة صورة Story. اختر التطبيق المطلوب.");
                } else {
                    showCopyStatus("هذا الجهاز لا يدعم إرسال الصورة مباشرة من المتصفح. تم حفظ صورة Story بدلًا من ذلك.");
                    await saveBlobAsImage(blob);
                }
            } catch (error) {
                if (error.message === "no-result") {
                    showCopyStatus("قم بحساب النتيجة أولاً قبل مشاركتها.");
                    return;
                }

                try {
                    const blob = await generateResultBlob();
                    await saveBlobAsImage(blob);
                    showCopyStatus("تعذر فتح المشاركة المباشرة. تم حفظ صورة Story بدلًا من ذلك.");
                } catch {
                    showCopyStatus("تعذر تجهيز صورة Story.");
                }
            }
        }

        async function saveResultAsImage() {
            try {
                showCopyStatus("جارٍ تجهيز صورة Story...");
                const blob = await generateResultBlob();
                await saveBlobAsImage(blob);
                showCopyStatus("تم حفظ صورة Story بنجاح.");
            } catch (error) {
                if (error.message === "no-result") {
                    showCopyStatus("قم بحساب النتيجة أولاً قبل حفظها كصورة.");
                } else {
                    showCopyStatus("تعذر حفظ صورة Story. حاول مرة أخرى.");
                }
            }
        }
    </script>
</body>
</html>
